name: Release Artifact

# Publishes the `chronary` Python package to PyPI and creates a GitHub Release.
#
# Provenance posture:
#   - Publishes via PyPI Trusted Publishing — no PYPI_API_TOKEN required.
#     The `id-token: write` permission and `pypa/gh-action-pypi-publish`
#     are sufficient once chronary-python is registered as a Trusted
#     Publisher for the `chronary` project on pypi.org.
#   - `attestations: true` on the pypa publish action records a Sigstore
#     attestation that PyPI surfaces on the project page.
#   - GitHub artifact attestations also fire on public repos via
#     actions/attest-build-provenance (visibility-gated).
#
# Prerequisites (one-time, on flip to public):
#   1. chronary-python is public on GitHub.
#   2. pypi.org → Your projects → `chronary` → Publishing → Add a new
#      pending publisher (or, if the project exists, "Add a new publisher"):
#        Owner: Chronary
#        Repo: chronary-python
#        Workflow: release-artifact.yml
#        Environment: (leave blank)
#   3. PYPI_API_TOKEN repo secret has been deleted (if it was ever set)
#      and the legacy API token revoked on pypi.org.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release manifest
        id: manifest
        run: |
          python - <<'PY'
          import json
          import os
          manifest = json.load(open(".chronary-release.json", "r", encoding="utf-8"))
          if manifest["artifact"] != "python-sdk":
              raise SystemExit("Expected artifact python-sdk")
          if manifest["public_tag"] != os.environ["GITHUB_REF_NAME"]:
              raise SystemExit("Tag mismatch between manifest and workflow ref")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(
                  f"publish_registry={str(bool(manifest['publish_registry'])).lower()}\n"
              )
          PY
          test -f RELEASE_NOTES.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Test
        # Threshold is temporarily 88 to match .github/public-artifacts.json
        # (see PR #696 / issue #695). Restore to 90 once #695 lands the
        # missing tests for waitlist / audit_log / async webhook variants.
        run: python -m pytest -v --cov=chronary --cov-fail-under=88

      - name: Build
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing + attestations)
        if: steps.manifest.outputs.publish_registry == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Attest build provenance for GitHub Release assets
        # Free-tier orgs can only attest in PUBLIC repos. Auto-enables on flip.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "chronary ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.txt
