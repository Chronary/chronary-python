name: Release Artifact

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Validate release manifest
        id: manifest
        run: |
          python - <<'PY'
          import json
          import os
          manifest = json.load(open(".chronary-release.json", "r", encoding="utf-8"))
          if manifest["artifact"] != "python-sdk":
              raise SystemExit("Expected artifact python-sdk")
          if manifest["public_tag"] != os.environ["GITHUB_REF_NAME"]:
              raise SystemExit("Tag mismatch between manifest and workflow ref")
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(
                  f"publish_registry={str(bool(manifest['publish_registry'])).lower()}\n"
              )
          PY
          test -f RELEASE_NOTES.txt

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]" build

      - name: Test
        run: python -m pytest -v --cov=chronary --cov-fail-under=90

      - name: Build
        run: python -m build

      - name: Publish to PyPI (Trusted Publishing + attestations)
        if: steps.manifest.outputs.publish_registry == 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          attestations: true

      - name: Attest build provenance for GitHub Release assets
        # Free-tier orgs can only attest in PUBLIC repos. Auto-enables on flip.
        if: github.event.repository.visibility == 'public'
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*'

      - name: Create GitHub Release
        run: |
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --title "chronary ${GITHUB_REF_NAME}" \
            --notes-file RELEASE_NOTES.txt
